<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Scan Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100vh;
      cursor: grab;
    }

    body:active { cursor: grabbing; }

    canvas { display: block; }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: transparent;
      z-index: 10;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      color: #999;
      gap: 8px;
      transition: opacity 0.6s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loader span { animation: pulse 1.5s ease-in-out infinite; }

    #progress-bar {
      width: 120px;
      height: 2px;
      background: #ddd;
      border-radius: 1px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: #999;
      transition: width 0.2s ease;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div id="loader">
    <span>loading</span>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.5,
      80
    );
    camera.position.set(1, 0.9, -0.02);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.65;
    document.body.appendChild(renderer.domElement);

    // Lighting — soft, even lighting to show vertex colors naturally
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    const keyLight = new THREE.DirectionalLight(0xffffff, 0.6);
    keyLight.position.set(2, 3, 4);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-3, 1, -2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 5);
    rimLight.position.set(4, 6, -4);
    scene.add(rimLight);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.4;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;
    controls.minPolarAngle = Math.PI * 0.3;
    controls.maxPolarAngle = Math.PI * 0.7;

    // Load model (meshopt-compressed GLB — see 3dscan01-ver01.opt.glb)
    const MODEL_PATH = './3dscan01-ver01.opt.glb';
    const progressFill = document.getElementById('progress-fill');
    const loaderEl = document.getElementById('loader');

    new GLTFLoader().setMeshoptDecoder(MeshoptDecoder).load(
      MODEL_PATH,
      (gltf) => {
        const model = gltf.scene;

        // Ensure vertex colors are enabled on all materials
        model.traverse((child) => {
          if (child.isMesh && child.geometry.attributes.color) {
            child.material.vertexColors = true;
            child.material.needsUpdate = true;
          }
        });

        // Center and scale
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        model.position.sub(center);
        const scale = 1.8 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(scale);

        const boxScaled = new THREE.Box3().setFromObject(model);
        const cy = boxScaled.getCenter(new THREE.Vector3()).y;
        model.position.y -= cy * 0.;

        scene.add(model);
        controls.target.set(0.001, cy * 0.7, 0);
        controls.update();

        loaderEl.classList.add('hidden');
      },
      (xhr) => {
        if (xhr.lengthComputable) {
          progressFill.style.width = (xhr.loaded / xhr.total * 100) + '%';
        }
      },
      (err) => {
        console.error('GLB load error:', err);
        loaderEl.innerHTML =
          '<span style="color:#c44;animation:none;max-width:340px;text-align:center;line-height:1.6">' +
          'Could not load model.<br><br>' +
          'Make sure <b>3dscan01-ver01.glb</b> is in the same folder as this HTML file, ' +
          'and you\'re opening it via a local server:<br><br>' +
          '<code style="background:#f5f5f5;padding:4px 8px;border-radius:3px">python3 -m http.server 8000</code></span>';
      }
    );

    (function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    })();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
